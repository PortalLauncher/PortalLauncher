name: Release Portal Launcher

on:
  push:
    tags:
      - '*-PortalLauncher'

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Prepare Android keystore
      run: echo "${{ secrets.ENCODEDKEYSTORE }}" | base64 --decode > app/keystore.jks
    - name: Build Portal Launcher release APK
      run: ./gradlew assemblePortalLauncherNoadsRelease --build-cache
      env:
        KEYSTORE: keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }}
        KEY_ALIAS: portal
        KEY_PASSWORD: ${{ secrets.KEYPASSWORD }}
    - name: Rename APK
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION%-PortalLauncher}"
        APK_DIR=app/build/outputs/apk/portalLauncherNoads/release
        mv $APK_DIR/app-portalLauncher-noads-release.apk PortalLauncher-${VERSION}.apk
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: PortalLauncher-*.apk
        name: Portal Launcher ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
